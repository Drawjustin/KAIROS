spring:
  datasource:
    url: jdbc:h2:mem:kairos;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

kairos:
  jwt:
    issuer: test-kairos
    secret: test-secret-test-secret-test-secret-12345
    access-token-expiration: 15m
    refresh-token-expiration: 30d
