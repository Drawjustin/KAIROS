spring:
  config:
    # 로컬 실행 시 .env/.env.local 값을 선택적으로 읽어온다.
    import: optional:file:.env/.env.local[.properties]
  profiles:
    default: local
  application:
    name: ${KAIROS_APP_NAME:kairos}
  jpa:
    # 웹 계층에서 지연 로딩을 이어가지 않고 서비스 트랜잭션 안에서만 DB 접근하게 강제한다.
    open-in-view: false

kairos:
  jwt:
    # 운영/개발 환경 모두 환경 변수로 바꿔 끼울 수 있게 열어둔다.
    issuer: ${KAIROS_JWT_ISSUER:kairos}
    secret: ${KAIROS_JWT_SECRET}
    access-token-expiration: ${KAIROS_JWT_ACCESS_TOKEN_EXPIRATION:15m}
    refresh-token-expiration: ${KAIROS_JWT_REFRESH_TOKEN_EXPIRATION:30d}

logging:
  pattern:
    # 모든 로그에서 요청 추적용 traceId를 바로 확인할 수 있게 MDC 값을 붙인다.
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) [%X{traceId:-no-trace}] %clr(${PID:- }){magenta} --- [%15.15t] %clr(%-40.40logger{39}){cyan} : %m%n%wEx"
