spring:
  datasource:
    url: ${KAIROS_API_DB_URL}
    username: ${KAIROS_API_DB_USERNAME}
    password: ${KAIROS_API_DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

server:
  error:
    include-message: never

logging:
  level:
    root: INFO

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
