name: Commitlint

on:
  pull_request:
  push:

jobs:
  commitlint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install commitlint tooling
        run: npm install

      - name: Lint pull request commits
        if: github.event_name == 'pull_request'
        run: npx commitlint --config commitlint.config.cjs --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      - name: Lint pushed commits
        if: github.event_name == 'push'
        run: npx commitlint --config commitlint.config.cjs --from "${{ github.event.before }}" --to "${{ github.event.after }}" --verbose
